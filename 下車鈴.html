<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚨 虛擬實體下車鈴</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            text-align: center;
            background-color: #2c3e50;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h2 { margin-top: 10px; color: #ecf0f1; }

        .setup-box {
            background: #34495e; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 30px; width: 100%; max-width: 350px;
        }

        input[type="text"] {
            width: 100%; padding: 12px; font-size: 18px; text-align: center;
            border-radius: 8px; border: none; box-sizing: border-box; margin-bottom: 10px;
            font-weight: bold;
        }

        .btn-connect {
            width: 100%; padding: 12px; font-size: 18px; font-weight: bold;
            background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer;
        }
        .btn-connect.connected { background: #e67e22; }

        /* ✨ 擬真下車鈴樣式 */
        .bell-container {
            flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; max-width: 400px;
        }

        .bell-button {
            width: 250px; height: 250px; border-radius: 50%;
            background: radial-gradient(circle, #ff4757 30%, #c0392b 90%);
            border: 12px solid #ecf0f1;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 -10px 20px rgba(0,0,0,0.3);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s, box-shadow 0.1s;
            position: relative;
            margin-bottom: 40px;
            -webkit-tap-highlight-color: transparent;
        }

        .bell-button:active {
            transform: scale(0.92) translateY(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.6), inset 0 -5px 10px rgba(0,0,0,0.4);
        }

        .bell-button span {
            font-size: 40px; font-weight: 900; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            pointer-events: none;
        }

        .info-panel {
            background: rgba(0,0,0,0.4); padding: 15px 25px; border-radius: 12px;
            border: 1px solid #7f8c8d; width: 100%; box-sizing: border-box;
        }

        .target-stop {
            font-size: 32px; font-weight: bold; color: #f1c40f; margin: 10px 0;
            text-shadow: 0 0 10px rgba(241,196,15,0.3);
        }

        .delay-warning {
            font-size: 14px; color: #bdc3c7; margin-top: 5px;
        }

        #toast {
            visibility: hidden; min-width: 200px; background-color: rgba(255,255,255,0.9);
            color: #333; text-align: center; border-radius: 30px; padding: 12px 20px;
            position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%);
            font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-size: 16px;
        }
        #toast.show { visibility: visible; animation: fadein 0.3s, fadeout 0.3s 1.5s; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjxGWY6hN4yx-v2pa6I5UItxy_PNaOPK8",
            databaseURL: "https://bus-remote-control-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bus-remote-control"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentBusId = "";
        let isConnected = false;
        let unsubscribeState = null;

        let currentTargetStop = "等待連線...";
        let nextTargetStop = "無";

        window.onload = function() {
            const savedBusId = localStorage.getItem('virtual_bell_bus_id');
            if (savedBusId) document.getElementById('bus-id').value = savedBusId;
            
            // 支援網址帶入參數 ?bus=9527 自動連線
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('bus')) {
                document.getElementById('bus-id').value = urlParams.get('bus');
                setTimeout(() => toggleConnect(), 500);
            }
        };

        window.showToast = function(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg; t.className = "show";
            setTimeout(() => { t.className = t.className.replace("show", ""); }, 1800);
        }

        window.toggleConnect = function() {
            const busInput = document.getElementById('bus-id');
            const btn = document.getElementById('btn-connect');
            const bellContainer = document.getElementById('bell-container');

            if (!isConnected) {
                const busId = busInput.value.trim();
                if (!busId) { alert("請輸入車號！"); return; }

                currentBusId = busId;
                localStorage.setItem('virtual_bell_bus_id', currentBusId);

                busInput.disabled = true;
                isConnected = true;
                btn.innerText = "斷開連線";
                btn.classList.add("connected");
                bellContainer.style.display = "flex";
                
                showToast(`✅ 已鎖定車號：${currentBusId}`);

                // 📡 監聽主機目前的狀態，預測按下按鈕會發生什麼事
                unsubscribeState = onValue(ref(db, `buses/${currentBusId}/state`), (snap) => {
                    if (snap.exists()) {
                        const state = snap.val();
                        if (state.upcomingStops && state.upcomingStops.length > 0) {
                            currentTargetStop = state.upcomingStops[0].name;
                            nextTargetStop = state.upcomingStops.length > 1 ? state.upcomingStops[1].name : "終點站";
                            
                            document.getElementById('display-stop').innerText = currentTargetStop;
                            document.getElementById('display-next').innerText = nextTargetStop;
                        }
                    } else {
                        document.getElementById('display-stop').innerText = "車輛未啟動導航";
                    }
                });

            } else {
                busInput.disabled = false;
                isConnected = false;
                btn.innerText = "連線上線";
                btn.classList.remove("connected");
                bellContainer.style.display = "none";
                if (unsubscribeState) { unsubscribeState(); unsubscribeState = null; }
            }
        };

        // 🛑 核心功能：發送硬體訊號
        window.triggerVirtualBell = function() {
            if (!isConnected || !currentBusId) return;

            // 完美模擬 ESP32：只送一個時間戳記進去！大腦判斷全交給主機。
            set(ref(db, `buses/${currentBusId}/hardware_bell`), Date.now())
                .then(() => {
                    showToast("🔔 叮咚！訊號已送出");
                    // 手機震動回饋 (如果裝置支援)
                    try { if ('vibrate' in navigator) navigator.vibrate(100); } catch(e){}
                })
                .catch((e) => {
                    alert("發送失敗，請檢查網路連線！");
                });
        };
    </script>
</head>
<body>

    <h2>🛑 虛擬實體下車鈴</h2>
    <p style="color:#bdc3c7; font-size:14px; margin-top:-5px;">模擬 NodeMCU-32S 硬體按鈕訊號</p>

    <div class="setup-box">
        <input type="text" id="bus-id" placeholder="請輸入綁定車號 (例: 9527)">
        <button id="btn-connect" class="btn-connect" onclick="toggleConnect()">連線上線</button>
    </div>

    <div id="bell-container" class="bell-container">
        <div class="bell-button" onclick="triggerVirtualBell()">
            <span>下車鈴</span>
        </div>

        <div class="info-panel">
            <div style="font-size: 16px; color: #ecf0f1;">目前主機鎖定站點：</div>
            <div id="display-stop" class="target-stop">等待連線...</div>
            <div class="delay-warning">
                ℹ️ 模擬器說明：<br>按下去將送出實體訊號，由主機的「智慧引擎」決定預約本站。<br>
                <span style="color:#e74c3c;">(若主機正處於 5 秒消燈狀態，將自動幫您遞延預約：<b id="display-next" style="color:#fff;">無</b>)</span>
            </div>
        </div>
    </div>

    <div id="toast">訊息</div>

</body>
</html>
